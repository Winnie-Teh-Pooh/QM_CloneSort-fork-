name: Build Quasimorph Mod
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Add MSBuild to PATH
        uses: microsoft/setup-msbuild@v2

      - name: Build Mod
        run: msbuild src/QM_CloneSort.csproj /p:Configuration=Release

      - name: Upload DLL
        uses: actions/upload-artifact@v4
        with:
          name: Quasimorph-Mod-DLL
          path: src/bin/Release/*.dll
